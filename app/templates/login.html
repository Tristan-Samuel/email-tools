{% extends "base.html" %}

{% block title %}Login | Email Intelligence Studio{% endblock %}

{% block content %}
<main class="login-layout">
    <section class="panel login-panel reveal is-visible">
        <p class="eyebrow">Account access</p>
        <h1>Log in with your email</h1>
        <p class="hero-copy">
            This creates your local session and automatically scopes the dashboard to this account.
        </p>
        <form action="{{ url_for('main.login') }}" method="post" class="login-form">
            <label for="email">Email address</label>
            <input id="email" name="email" type="email" required placeholder="you@example.com">
            <button type="submit">Continue</button>
        </form>
    </section>
</main>
{% endblock %}
